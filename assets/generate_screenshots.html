<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #1a1a2e; padding: 20px; font-family: 'JetBrains Mono', monospace; }
  .term { background: #0a0a12; border-radius: 10px; overflow: hidden; margin-bottom: 20px; max-width: 720px; }
  .bar  { background: #161622; padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #1e1e30; }
  .dot  { width: 12px; height: 12px; border-radius: 50%; }
  .bt   { color: #555; font-size: 11px; margin-left: 6px; }
  pre   { padding: 18px 22px; margin: 0; font-size: 13px; line-height: 1.65; overflow-x: auto; }
  .w  { color: #e2e2f0; }
  .p  { color: #c084fc; font-weight: bold; }
  .c  { color: #67e8f9; font-weight: bold; }
  .g  { color: #555; }
  .go { color: #fbbf24; font-weight: bold; }
  .gr { color: #4ade80; font-weight: bold; }
  .r  { color: #f87171; }
  .d  { color: #333; }
  .pr { color: #4ade80; }
  .hint { background: #0d1f0d; border-left: 3px solid #22543d; padding: 10px 14px; border-radius: 0 6px 6px 0; margin: 6px 0; }
  .hint span { color: #86efac; }
</style>
</head>
<body>
<p style="color:#888;font-size:12px">Open in browser, screenshot each .term div for README assets</p>
</body>
</html>
